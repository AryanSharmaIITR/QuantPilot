# =============================================================================
# QuantPilot — automated daily inference pipeline
# -----------------------------------------------------------------------------
# Runs the live prediction pipeline on a schedule:
#     ingest(predict) -> preprocess(predict) -> predict
#
# It relies on the git-tracked NN checkpoint
# (artifacts/final_market_pipeline_nn_model.pth) and regenerates the short-window
# prediction data on each run, so no GPU / retraining is needed in CI.
#
# Produces predictions.csv, uploaded as a build artifact. Optionally commits it
# back to the repo (see the "commit predictions" step — disabled by default).
#
# Triggers:
#   * schedule  — every weekday ~30 min after NSE close (10:30 UTC ≈ 16:00 IST)
#   * workflow_dispatch — manual run from the Actions tab (optional retrain)
# =============================================================================
name: QuantPilot Pipeline

on:
  schedule:
    # 10:30 UTC, Mon-Fri (after Indian market close). Cron is always UTC.
    - cron: "30 10 * * 1-5"
  workflow_dispatch:
    inputs:
      retrain:
        description: "Run the full TRAIN pipeline instead of inference (slow)"
        type: boolean
        default: false

# Avoid overlapping runs clobbering each other's data/artifacts.
concurrency:
  group: quantpilot-pipeline
  cancel-in-progress: false

permissions:
  contents: write   # needed only if the commit step is enabled

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # CPU-only torch keeps the CI image small and fast.
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Run inference pipeline
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.retrain == false }}
        run: python signals/pipeline.py predict-pipeline

      - name: Run training pipeline (manual retrain)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.retrain == true }}
        run: python signals/pipeline.py train-pipeline

      - name: Upload predictions
        uses: actions/upload-artifact@v4
        with:
          name: predictions
          path: predictions.csv
          if-no-files-found: warn

      # --- Optional: commit predictions.csv back to the repo --------------------
      # Enable by removing the "if: false" guard below.
      - name: Commit predictions
        if: false
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add predictions.csv
          git diff --staged --quiet || git commit -m "chore: update predictions [skip ci]"
          git push
